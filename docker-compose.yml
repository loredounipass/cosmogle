version: "3.9"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: server
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    environment:
      # Override REDIS_HOST to use the container name inside the Docker network
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
        reservations:
          memory: 256M
          cpus: "0.25"

  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - backend-redis:/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 128M
          cpus: "0.10"

  turn:
    image: coturn/coturn:latest
    container_name: turn
    restart: unless-stopped
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "49152-49160:49152-49160/udp"
    command:
      - -n
      - --log-file=stdout
      - --min-port=49152
      - --max-port=49160
      - --user=strangers:strangers123
      - --realm=strangers.local
      - --lt-cred-mech
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 128M
          cpus: "0.10"

networks:
  backend:
    driver: bridge

volumes:
  backend-redis:
    driver: local